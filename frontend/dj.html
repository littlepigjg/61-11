<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内网音频广播 - DJ 控制台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🎛️ DJ 控制台</h1>
      <nav>
        <a href="index.html" class="nav-link">播放器</a>
        <a href="dj.html" class="nav-link active">DJ 控制台</a>
      </nav>
    </header>

    <main class="main">
      <section class="channels-section">
        <h2>选择频道</h2>
        <div class="channel-list" id="channelList">
        </div>
      </section>

      <section class="dj-panel">
        <div class="dj-card">
          <div class="dj-header">
            <h2 id="djChannelName">选择频道</h2>
            <span class="status-badge" id="statusBadge">停止</span>
          </div>

          <div class="now-playing">
            <div class="np-label">正在播放</div>
            <div class="np-title" id="nowPlaying">--</div>
          </div>

          <div class="dj-controls">
            <button id="prevBtn" class="control-btn">⏮</button>
            <button id="playPauseBtn" class="control-btn play-btn-large">▶</button>
            <button id="nextBtn" class="control-btn">⏭</button>
          </div>

          <div class="volume-section">
            <label>频道音量</label>
            <div class="volume-control large">
              <span>🔈</span>
              <input type="range" id="channelVolume" min="0" max="100" value="100">
              <span>🔊</span>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat-box">
              <span class="stat-label">在线收听</span>
              <span class="stat-value large" id="djListenerCount">0</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">播放列表</span>
              <span class="stat-value large" id="playlistCount">0</span>
            </div>
          </div>

          <div class="fade-section">
            <h3>淡入淡出设置</h3>
            <div class="fade-controls">
              <div class="fade-control-row">
                <label class="fade-label">
                  <input type="checkbox" id="fadeEnabled">
                  启用淡入淡出
                </label>
              </div>
              
              <div class="fade-control-row">
                <label>渐变类型</label>
                <select id="fadeType">
                  <option value="linear">线性 (Linear)</option>
                  <option value="exponential">指数 (Exponential)</option>
                  <option value="logarithmic">对数 (Logarithmic)</option>
                  <option value="quadratic">二次方 (Quadratic)</option>
                </select>
              </div>

              <div class="fade-control-row">
                <label>淡入时长: <span id="fadeInValue">2.0</span> 秒</label>
                <input type="range" id="fadeInDuration" min="0" max="10" step="0.1" value="2">
              </div>

              <div class="fade-control-row">
                <label>淡出时长: <span id="fadeOutValue">2.0</span> 秒</label>
                <input type="range" id="fadeOutDuration" min="0" max="10" step="0.1" value="2">
              </div>

              <div class="fade-control-row">
                <label>预淡出提前: <span id="preFadeOutValue">3.0</span> 秒</label>
                <input type="range" id="preFadeOutStart" min="0" max="10" step="0.1" value="3">
              </div>

              <div class="fade-control-row">
                <label>交叉淡入淡出: <span id="crossfadeValue">1.0</span> 秒</label>
                <input type="range" id="crossfadeDuration" min="0" max="5" step="0.1" value="1">
              </div>

              <div class="fade-status" id="fadeStatus">
                <span class="fade-status-label">当前状态:</span>
                <span class="fade-status-value" id="fadeStatusValue">待机</span>
              </div>

              <button id="applyFadeBtn" class="apply-btn">应用设置</button>
            </div>
          </div>

          <div class="playlist-section">
            <h3>播放列表</h3>
            <div class="playlist" id="playlist">
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/dj.js"></script>
</body>
</html>
